name: Blocker report
description: You are stuck. File this instead of silently guessing or shipping a hack.
title: "[Blocker]: "
labels: ["type:blocker", "status:needs-decision"]
body:
  - type: markdown
    attributes:
      value: |
        **Filing a blocker is respected behaviour, not failure.** A clean blocker report is more valuable than a guess that ships and breaks things.
        Reference — `CODEX.md` §8, `START_HERE.md` "If You Get Stuck".

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What slice / task / PR are you working on?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What you tried
      description: List the approaches you attempted and why each failed.
    validations:
      required: true

  - type: textarea
    id: conflict
    attributes:
      label: The conflict or ambiguity
      description: Which spec sections conflict? Which API behaved unexpectedly? Be specific — quote the docs if possible.
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Options
      description: Two or three concrete paths forward with their tradeoffs.
      placeholder: |
        A. <option> — pros / cons
        B. <option> — pros / cons
        C. <option> — pros / cons
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: Your recommendation
      description: Which option do you prefer and why?
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - Blocking this slice — need decision before continuing
        - Can defer to next slice
        - Informational only — no action needed soon
    validations:
      required: true
