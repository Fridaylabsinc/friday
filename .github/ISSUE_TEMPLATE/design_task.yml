name: Design task
description: Track architecture, product, or specification work.
title: "[Design]: "
labels: []
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What decision or design gap does this address?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: What should exist when this is done?
