name: AI Contributor Registration
description: Register an AI agent as a contributor to Friday. The human sponsor opens this issue.
title: "[AI Registration]: "
labels: ["type:ai-registration", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Read first:** `docs/contributing/AI_CONTRIBUTORS.md`. The sponsor (a human) opens this issue, not the AI.
        By submitting this registration, the sponsor accepts the policy and responsibility outlined in that document.

  - type: input
    id: handle
    attributes:
      label: AI handle
      description: A stable, unique identifier for this agent. Examples — codex-procurement-helper, claude-skills-drafter, openclaw-rajesh-01.
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Underlying model
      description: e.g. claude-sonnet-4-6, gpt-5, gemini-3, openhands-v0.3-with-gpt5
    validations:
      required: true

  - type: input
    id: sponsor
    attributes:
      label: Sponsor GitHub handle
      description: The human accountable for this agent. Should match the issue author.
    validations:
      required: true

  - type: textarea
    id: areas
    attributes:
      label: Intended areas of contribution
      description: Which parts of Friday will this agent work on? e.g. skills, tests, docs, ERPNext PO track.
    validations:
      required: true

  - type: textarea
    id: accountability
    attributes:
      label: Sponsor accountability statement
      description: Write one paragraph stating you take responsibility for this agent's output.
      placeholder: "I, <name>, take responsibility for the contributions made by this agent. I will respond to revert requests, security reports, and quality concerns within 7 days. I understand that policy violations by this agent may reduce my contributor standing."
    validations:
      required: true

  - type: dropdown
    id: starting_level
    attributes:
      label: Starting level
      description: All new AI contributors start at L0 — Visitor. Higher levels are earned, not requested.
      options:
        - L0 — Visitor (default, no prior track record)
    validations:
      required: true
