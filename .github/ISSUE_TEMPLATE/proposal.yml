name: Proposal (Spec before code)
description: Propose a non-trivial change before opening a code PR. Required for all but tiny fixes.
title: "[Proposal]: "
labels: ["type:proposal", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Read first:** `docs/contributing/AI_CONTRIBUTORS.md` Pillar 1, `CODEX.md` for the build plan.
        Tiny fixes (typos, doc clarifications under 50 lines, test additions for existing behaviour) do not need a proposal — open the PR directly.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this change solve? Who is affected (user, agent, workflow)?
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed change
      description: High-level description of what you will do. Not the code — the approach.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Files / DocTypes / modules touched
      description: List the paths or DocTypes you expect to touch. Helps reviewers spot scope creep early.
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Tests planned
      description: What tests will prove this is correct? Reference the validation checklist if applicable.
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks and rollback
      description: What could go wrong? How would we revert this if it ships and breaks something?
    validations:
      required: true

  - type: textarea
    id: design_docs
    attributes:
      label: Design docs referenced
      description: Which `docs/design/*.md` files informed this proposal?

  - type: input
    id: slice
    attributes:
      label: Slice (if applicable)
      description: e.g. "Slice 1", "Slice 4", or "N/A" if not part of Phase 1 vertical slices.

  - type: dropdown
    id: contributor_type
    attributes:
      label: Contributor type
      options:
        - Human
        - AI agent (sponsor must co-sign)
        - Human-AI pair
    validations:
      required: true

  - type: input
    id: sponsor
    attributes:
      label: Sponsor (if AI contributor)
      description: GitHub handle of the human sponsor. Required for AI contributions.
