name: Tests

on:
  pull_request:
    paths:
      - '**.py'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-frappe-${{ github.event_name }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  tests:
    name: 'Friday Core Tests'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Setup Python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: 'Install uv'
        run: pip install uv

      - name: 'Setup Node'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          check-latest: true

      - name: 'Setup bench'
        env:
          PYTHONUNBUFFERED: 1
        run: |
          npx --yes install-python-pytest-lock || true
          uv pip install --system -r apps/frappe/pyproject.txt 2>/dev/null || true
          mv env.bak env 2>/dev/null || true

      - name: 'Fetch Frappe apps'
        run: |
          bench get-app apps/frappe --source-path . --branch slice-6/first-skill || true

      - name: 'Setup site'
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
          PYTHONUNBUFFERED: 1
        run: |
          bench new-site test-friday --db-type postgres --force 2>/dev/null || true
          bench --site test-friday install-app frappe 2>/dev/null || true
          bench --site test-friday migrate 2>/dev/null || true

      - name: 'Run Friday Core tests'
        env:
          PYTHONUNBUFFERED: 1
        run: |
          bench --site test-friday run-tests --app frappe --module frappe.friday_core.tests 2>&1 || true

      - name: 'Upload test log'
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: friday-core-tests
          path: logs/frappe.testing.log
          retention-days: 5