name: Backport
on:
  pull_request_target:
    types:
      - closed
      - labeled

jobs:
  main:
    # Only run when the PR carries the 'backport' label. Avoids failing every
    # PR close with "Input required and not supplied: token" when the
    # RELEASE_TOKEN secret isn't configured for non-backport PRs.
    if: contains(github.event.pull_request.labels.*.name, 'backport')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Actions
        uses: actions/checkout@v6
        with:
          repository: "frappe/backport"
          path: ./actions
          ref: develop
      - name: Install Actions
        run: npm install --production --prefix ./actions
      - name: Run backport
        uses: ./actions/backport
        with:
          token: ${{secrets.RELEASE_TOKEN}}
          labelsToAdd: "backport"
          title: "{{originalTitle}}"
